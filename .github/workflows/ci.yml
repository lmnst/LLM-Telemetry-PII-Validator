name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs on the same ref so a fast follow-up commit doesn't
# queue behind the build it just made stale.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check + javadoc (JDK 21, ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - name: Run check + javadoc
        shell: bash
        run: ./gradlew check javadoc

  chaos:
    name: chaos property tests (JDK 21, ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - name: Run chaos property suite
        run: ./gradlew test -PchaosTests
