name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs on the same ref so a fast follow-up commit doesn't
# queue behind the build it just made stale.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# actions/checkout@v5 and actions/setup-java@v5 target Node 24 natively, so
# the workflow does not depend on the runner's deprecation-fallback shim.

jobs:
  check:
    name: check + javadoc (JDK 21, ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@v5
      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - name: Run check + javadoc
        shell: bash
        run: ./gradlew check javadoc

  chaos:
    name: chaos property tests (JDK 21, ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@v5
      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - name: Run chaos property suite
        run: ./gradlew test -PchaosTests

  integration:
    name: docker integration test (JDK 21, ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@v5
      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      # RUN_DOCKER_IT=1 turns Docker absence into a hard test failure rather
      # than a silent skip; ubuntu-latest runners ship with Docker Engine, so
      # the gate should always be satisfied here.
      - name: Run docker integration suite
        env:
          RUN_DOCKER_IT: "1"
        run: ./gradlew test -PintegrationTests
